name: Build IPTV Player

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_REPOSITORY: serhabdel/iptv-player

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect release trigger
        id: detect
        shell: bash
        run: |
          raw_version="$(tr -d '[:space:]' < VERSION)"
          version="${raw_version#v}"

          if [ -z "$version" ]; then
            echo "VERSION file is empty."
            exit 1
          fi

          if ! [[ "$version" =~ ^[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid VERSION format: $raw_version"
            echo "Use values like 1.2.3 or v1.2.3"
            exit 1
          fi

          should_release=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_release=true
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              if git diff --name-only HEAD^ HEAD | grep -Fxq "VERSION"; then
                should_release=true
              fi
            else
              should_release=true
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: detect-release
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.detect-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller iptv-player.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$env:APP_VERSION" "scripts\windows\iptv-player.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-windows-portable
          path: dist/iptv-player.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-windows-installer
          path: dist/IPTV-Player-Setup-v${{ env.APP_VERSION }}.exe

  build-linux-deb:
    needs: detect-release
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.detect-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --noconsole --name iptv-player --add-data "assets:assets" --add-data "src:src" --add-data "LICENSE:." main.py

      - name: Create Debian package structure
        run: |
          mkdir -p deb_package/DEBIAN
          mkdir -p deb_package/usr/bin
          mkdir -p deb_package/usr/share/applications
          mkdir -p deb_package/usr/share/icons/hicolor/256x256/apps
          mkdir -p deb_package/usr/share/doc/iptv-player

          cp dist/iptv-player deb_package/usr/bin/
          chmod +x deb_package/usr/bin/iptv-player

          cp assets/logo.png deb_package/usr/share/icons/hicolor/256x256/apps/iptv-player.png
          cp LICENSE deb_package/usr/share/doc/iptv-player/LICENSE

          cat > deb_package/DEBIAN/control << EOF
          Package: iptv-player
          Version: ${APP_VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Maintainer: IPTV Player <iptv-player@example.com>
          Description: Cross-platform IPTV Player
           A modern IPTV player built with Python and Flet.
           Supports M3U playlists and Xtream Codes API.
          EOF

          cat > deb_package/usr/share/applications/iptv-player.desktop << EOF
          [Desktop Entry]
          Name=IPTV Player
          Comment=Cross-platform IPTV Player
          Exec=/usr/bin/iptv-player
          Icon=iptv-player
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          EOF

          dpkg-deb --build deb_package iptv-player.deb

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-linux-deb
          path: iptv-player.deb

  build-linux-appimage:
    needs: detect-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --noconsole --name iptv-player --add-data "assets:assets" --add-data "src:src" --add-data "LICENSE:." main.py

      - name: Create AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/licenses/iptv-player

          cp dist/iptv-player AppDir/usr/bin/
          chmod +x AppDir/usr/bin/iptv-player
          cp assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/iptv-player.png
          cp assets/logo.png AppDir/iptv-player.png
          cp LICENSE AppDir/usr/share/licenses/iptv-player/LICENSE

          cat > AppDir/iptv-player.desktop << EOF
          [Desktop Entry]
          Name=IPTV Player
          Comment=Cross-platform IPTV Player
          Exec=iptv-player
          Icon=iptv-player
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          EOF

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/iptv-player" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir IPTV-Player-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-linux-appimage
          path: IPTV-Player-x86_64.AppImage

  build-macos:
    needs: detect-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "IPTV Player" --add-data "assets:assets" --add-data "src:src" --add-data "LICENSE:." main.py

          mkdir -p dmg_contents
          cp -r "dist/IPTV Player.app" dmg_contents/ 2>/dev/null || cp dist/"IPTV Player" dmg_contents/
          hdiutil create -volname "IPTV Player" -srcfolder dmg_contents -ov -format UDZO IPTV-Player.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-macos
          path: IPTV-Player.dmg

  release:
    needs: [detect-release, build-windows, build-linux-deb, build-linux-appimage, build-macos]
    runs-on: ubuntu-latest
    if: needs.detect-release.outputs.should_release == 'true' && github.repository == 'serhabdel/iptv-player'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          repository: ${{ env.RELEASE_REPOSITORY }}
          tag_name: ${{ needs.detect-release.outputs.tag }}
          name: IPTV Player ${{ needs.detect-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/iptv-player-windows-portable/iptv-player.exe
            artifacts/iptv-player-windows-installer/IPTV-Player-Setup-v${{ needs.detect-release.outputs.version }}.exe
            artifacts/iptv-player-linux-deb/iptv-player.deb
            artifacts/iptv-player-linux-appimage/IPTV-Player-x86_64.AppImage
            artifacts/iptv-player-macos/IPTV-Player.dmg
            LICENSE
            assets/logo.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
